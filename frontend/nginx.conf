server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver; defer upstream resolution to request-time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy /api and /health to the backend
    location ~ ^/(api|health) {
        set $backend http://backend:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Required for SSE — disable buffering so tokens stream immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # SPA fallback — all non-asset paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
